<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>borg</title>
<style>
  :root {
    --bg: #0c0c10;
    --panel: #16161d;
    --line: #26262f;
    --dim: #4a4a55;
    --text: #e7e7ee;
    --accent: #ffd23f;
    --accent2: #6ee7ff;
    --err: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ---- screen switching ---- */
  #landing, #stage { display: none; height: 100%; }
  body[data-screen="landing"] #landing { display: flex; }
  body[data-screen="stage"]   #stage   { display: flex; }
  body:not(.master) #controls { display: none; }

  /* ---- landing ---- */
  #landing {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 24px;
  }
  h1 {
    font-size: clamp(3rem, 12vw, 7rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--accent);
  }
  .tag { color: var(--dim); margin-bottom: 28px; font-size: 0.95rem; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px;
    width: min(380px, 100%);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .or { text-align: center; color: var(--dim); font-size: 0.85rem; }
  button {
    font: inherit;
    font-weight: 700;
    color: #0c0c10;
    background: var(--accent);
    border: 0;
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  button:active { transform: translateY(1px); }
  input, textarea, select {
    font: inherit;
    color: var(--text);
    background: #0c0c10;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 13px;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus {
    outline: 2px solid var(--accent2);
    outline-offset: -1px;
  }
  .create-row { display: flex; gap: 8px; }
  .create-row button { flex: 1 1 auto; }
  .create-row select { flex: 0 0 auto; width: auto; }
  #join-form { display: flex; gap: 8px; }
  #join-input { text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; }
  #join-form button { flex: 0 0 auto; }
  .error { color: var(--err); font-size: 0.85rem; min-height: 1em; text-align: center; }

  /* ---- stage ---- */
  #stage { flex-direction: column; }
  #controls {
    flex: 0 0 auto;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .codebox { display: flex; align-items: baseline; gap: 10px; }
  .codebox .label { color: var(--dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .code {
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 0.22em;
    color: var(--accent);
  }
  #send-form { display: flex; flex-direction: column; gap: 8px; }
  .send-row { display: flex; align-items: center; gap: 8px; }
  #dur-input { width: 90px; flex: 0 0 auto; }
  .hint { color: var(--dim); font-size: 0.8rem; flex: 0 0 auto; }
  .send-row button { margin-left: auto; }
  .share { color: var(--accent2); font-size: 0.8rem; word-break: break-all; cursor: pointer; }

  /* ---- karaoke line ---- */
  #line-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5vmin;
    min-height: 0;
  }
  .line {
    font-size: clamp(2rem, 8vw, 6.5rem);
    font-weight: 800;
    line-height: 1.3;
    letter-spacing: -0.01em;
    text-align: center;
    text-wrap: balance;
  }
  .word {
    position: relative;
    display: inline-block;
    color: var(--dim);
    transition: color 0.05s linear;
  }
  .word::before {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    color: var(--accent);
    overflow: hidden;
    white-space: pre;
    width: calc(var(--p, 0) * 100%);
    pointer-events: none;
  }
  .placeholder { color: var(--dim); font-weight: 600; font-size: 1.4rem; }

  /* ---- status + debug ---- */
  .status {
    flex: 0 0 auto;
    padding: 7px 14px;
    font-size: 0.8rem;
    color: var(--dim);
    border-top: 1px solid var(--line);
    text-align: center;
  }
  #debug {
    position: fixed;
    right: 10px;
    bottom: 40px;
    width: 280px;
    max-height: 40vh;
    overflow: auto;
    background: rgba(0,0,0,0.82);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--accent2);
  }
  #debug[hidden] { display: none; }
</style>
</head>
<body data-screen="landing">

  <main id="landing">
    <h1>borg</h1>
    <p class="tag">low-latency synchronized karaoke</p>
    <div class="card">
      <div class="create-row">
        <button id="btn-create">CREATE BORG</button>
        <select id="adaptor-select" title="borg input source">
          <option value="llm">Alien</option>
          <option value="manual">Human</option>
        </select>
      </div>
      <div class="or">— or —</div>
      <form id="join-form">
        <input id="join-input" placeholder="ENTER CODE" autocomplete="off"
               autocapitalize="characters" spellcheck="false" maxlength="9">
        <button type="submit">JOIN BORG</button>
      </form>
      <p id="landing-error" class="error"></p>
    </div>
  </main>

  <div id="stage">
    <header id="controls">
      <div class="codebox">
        <span class="label">join code</span>
        <span id="join-code-display" class="code"></span>
      </div>
      <form id="send-form">
        <textarea id="text-input" rows="2"
                  placeholder="type a line — Enter to send, Shift+Enter for newline"></textarea>
        <div class="send-row">
          <input id="dur-input" type="number" min="0" step="0.5" placeholder="auto">
          <span class="hint">sec (blank = auto)</span>
          <button type="submit">Send to borg</button>
        </div>
      </form>
      <span id="share-link" class="share" title="click to copy"></span>
    </header>

    <section id="line-wrap">
      <div id="line" class="line"><span class="placeholder">waiting for the borg…</span></div>
    </section>

    <div id="status" class="status">connecting…</div>
  </div>

  <div id="debug" hidden></div>

<script>
"use strict";

const $ = (id) => document.getElementById(id);
const body = document.body;
const DEBUG = new URLSearchParams(location.search).has("debug");
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

// ---- session state ----
let joinCode = null, masterCode = null, clientId = null, role = null;
let borgType = "manual";
let es = null;
let clockOffsetUs = 0, bestRttUs = Infinity, synced = false;
let currentLine = null, wordEls = [];

// ---- clock helpers ----
const nowUs = () => Math.round(performance.now() * 1000);
const serverNowUs = () => nowUs() + clockOffsetUs;

// ---- landing ----
$("btn-create").addEventListener("click", createBorg);
$("join-form").addEventListener("submit", (e) => {
  e.preventDefault();
  joinBorg($("join-input").value);
});
const prefill = new URLSearchParams(location.search).get("b");
if (prefill) $("join-input").value = prefill;

async function createBorg() {
  $("landing-error").textContent = "";
  borgType = $("adaptor-select").value;
  try {
    const res = await fetch("/api/borg?adaptor=" + encodeURIComponent(borgType), {
      method: "POST",
    });
    if (!res.ok) {
      throw new Error((await res.text()) || "could not create a borg");
    }
    const j = await res.json();
    joinCode = j.join_code;
    masterCode = j.master_code;
    clientId = j.client_id;
    role = "master";
    enterStage();
  } catch (e) {
    $("landing-error").textContent = e.message;
  }
}

async function joinBorg(raw) {
  $("landing-error").textContent = "";
  const code = raw.trim();
  if (!code) return;
  try {
    const res = await fetch("/api/borg/" + encodeURIComponent(code) + "/join", {
      method: "POST",
    });
    if (res.status === 404) throw new Error("no borg with that code");
    if (!res.ok) throw new Error("could not join");
    const j = await res.json();
    joinCode = j.join_code;
    clientId = j.client_id;
    role = "viewer";
    enterStage();
  } catch (e) {
    $("landing-error").textContent = e.message;
  }
}

function enterStage() {
  body.classList.toggle("master", role === "master");
  body.dataset.screen = "stage";
  $("join-code-display").textContent = joinCode;

  if (role === "master") {
    const link = location.origin + "/?b=" + joinCode;
    const share = $("share-link");
    share.textContent = "share: " + link;
    share.addEventListener("click", () => {
      navigator.clipboard?.writeText(link);
      share.textContent = "copied! " + link;
    });
    if (borgType === "llm") {
      $("text-input").placeholder =
        "the borg listens";
    }
    $("text-input").focus();
  }
  if (DEBUG) $("debug").hidden = false;

  startClockSync();
  connectStream();
}

// ---- clock synchronization (Cristian / NTP four-timestamp) ----
async function syncOnce() {
  const t0 = nowUs();
  let res;
  try {
    res = await fetch("/api/time?t0=" + t0);
  } catch {
    return;
  }
  const t3 = nowUs();
  const j = await res.json();
  // rtt = round trip minus the server's own processing gap.
  const rtt = (t3 - t0) - (j.server_send_us - j.server_recv_us);
  // Keep the least-contaminated (minimum-rtt) sample.
  if (rtt >= 0 && rtt < bestRttUs) {
    bestRttUs = rtt;
    clockOffsetUs = Math.round(
      ((j.server_recv_us - t0) + (j.server_send_us - t3)) / 2
    );
  }
}

async function startClockSync() {
  setStatus("syncing clock…");
  for (let i = 0; i < 5; i++) {
    await syncOnce();
    await sleep(150);
  }
  synced = true;
  reportRtt();
  updateStatus();
  setInterval(async () => {
    await syncOnce();
    reportRtt();
    updateStatus();
  }, 5000);
}

function reportRtt() {
  if (bestRttUs === Infinity) return;
  fetch("/api/borg/" + joinCode + "/rtt", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      client_id: clientId,
      one_way_us: Math.round(bestRttUs / 2),
    }),
  }).catch(() => {});
}

// ---- SSE receive path ----
function connectStream() {
  es = new EventSource(
    "/api/borg/" + joinCode + "/stream?client_id=" + encodeURIComponent(clientId)
  );
  es.addEventListener("hello", () => {
    logDebug("connected");
    updateStatus();
  });
  es.addEventListener("line", (e) => {
    scheduleLine(JSON.parse(e.data));
    updateStatus();
  });
  es.addEventListener("borg_closed", () => {
    setStatus("the borg has ended");
    es.close();
  });
  es.onerror = () => {
    if (es.readyState === EventSource.CONNECTING) setStatus("reconnecting…");
  };
}

// ---- synchronized word-by-word sweep ----
function scheduleLine(line) {
  currentLine = line;
  renderWords(line);
  let logged = false;

  const tick = () => {
    if (currentLine !== line) return; // superseded by a newer line
    const elapsed = serverNowUs() - line.display_at_us;

    if (elapsed < 0) {
      // Line is shown but the sweep has not started yet.
      for (const s of wordEls) s.style.setProperty("--p", 0);
      requestAnimationFrame(tick);
      return;
    }
    if (DEBUG && !logged) {
      logged = true;
      logDebug("line #" + line.seq + " sweep skew " +
        (elapsed / 1000).toFixed(1) + " ms");
    }

    const done = elapsed >= line.total_duration_us;
    for (let i = 0; i < line.words.length; i++) {
      const w = line.words[i];
      let p;
      if (elapsed >= w.end_us) p = 1;
      else if (elapsed <= w.start_us) p = 0;
      else p = (elapsed - w.start_us) / Math.max(1, w.end_us - w.start_us);
      wordEls[i].style.setProperty("--p", p);
    }
    if (!done) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function renderWords(line) {
  const el = $("line");
  el.innerHTML = "";
  wordEls = [];
  if (!line.words.length) {
    el.innerHTML = '<span class="placeholder">(empty line)</span>';
    return;
  }
  line.words.forEach((w, i) => {
    const span = document.createElement("span");
    span.className = "word";
    span.textContent = w.text;
    span.setAttribute("data-text", w.text);
    el.appendChild(span);
    if (i < line.words.length - 1) el.appendChild(document.createTextNode(" "));
    wordEls.push(span);
  });
}

// ---- master: send ----
$("send-form").addEventListener("submit", (e) => {
  e.preventDefault();
  sendLine();
});
$("text-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendLine();
  }
});

async function sendLine() {
  const ta = $("text-input");
  const text = ta.value.trim();
  if (!text) return;
  const payload = { master_code: masterCode, text };
  const secs = parseFloat($("dur-input").value);
  if (!isNaN(secs) && secs > 0) payload.duration_us = Math.round(secs * 1e6);
  ta.value = "";
  ta.focus();
  if (borgType === "llm") setStatus("the borg is thinking…");
  try {
    const res = await fetch("/api/borg/" + joinCode + "/line", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) logDebug("send failed: HTTP " + res.status);
  } catch {
    logDebug("send failed: network error");
  }
}

// ---- status + debug ----
function setStatus(s) {
  $("status").textContent = s;
}

function updateStatus() {
  if (!synced) {
    setStatus("syncing clock…");
    return;
  }
  const rttMs = (bestRttUs / 1000).toFixed(0);
  const role_ = role === "master" ? "borg master" : "viewer";
  setStatus("synced · " + role_ + " · ~" + rttMs + " ms rtt · ±" +
    (bestRttUs / 2000).toFixed(0) + " ms est. skew");
}

function logDebug(msg) {
  if (!DEBUG) return;
  const d = $("debug");
  const row = document.createElement("div");
  const t = new Date().toLocaleTimeString();
  row.textContent = t + "  " + msg;
  d.appendChild(row);
  while (d.children.length > 14) d.removeChild(d.firstChild);
  d.scrollTop = d.scrollHeight;
}
</script>
</body>
</html>
